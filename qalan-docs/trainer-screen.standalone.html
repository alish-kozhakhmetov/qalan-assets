<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Тренажёр — экран задачи (iPhone 16)</title>
<!--
  Клавиатура тренажёра «на бою»: полный экран задачи в рамке iPhone 16 (393×852).
  Верх: close · прогресс · жизни. Центр: задача + поле ответа. Низ: клавиатура.
  Токены DS зашиты (light). Long-press работает (клавиши с уголком).
-->
<style>
  :root{
    --bg-canvas:#f5f5f5; --bg-surface:#ffffff; --bg-subtle:#eaeaea; --bg-disabled:#eaeaea;
    --text-primary:#0a0a0a; --text-secondary:#4a4a4a; --text-tertiary:#b4b4b4; --text-disabled:#d6d6d6;
    --border-default:#eaeaea;
    --bg-brand:#0066fe; --bg-brand-pressed:#004fc5; --bg-accent-orange:#ff752c; --bg-critical:#ff4d4f;
    --on-brand:#ffffff; --on-brand-2:#b6d3ff;
    --radius-m:12px; --radius-l:16px; --radius-full:999px;
    --font:'Halvar Mittelschrift',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --display:'Platform LC','Halvar Mittelschrift',-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:#e6e7ea;display:flex;justify-content:center;align-items:flex-start;padding:40px 16px;font-family:var(--font)}

  /* iPhone 16 frame */
  .device{width:417px;background:#0a0a0a;border-radius:60px;padding:12px;box-shadow:0 40px 90px rgba(0,0,0,.35)}
  .screen{position:relative;width:393px;height:852px;background:var(--bg-surface);border-radius:48px;overflow:hidden;display:flex;flex-direction:column}
  .island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:126px;height:37px;background:#000;border-radius:20px;z-index:30}
  .statusbar{height:54px;flex:none;display:flex;align-items:flex-end;justify-content:space-between;padding:0 30px 6px;font-weight:600;font-size:15px;color:var(--text-primary)}
  .statusbar .r{display:flex;gap:6px;align-items:center}

  /* trainer top nav (sub-page) */
  .tnav{flex:none;display:flex;align-items:center;gap:12px;padding:6px 16px 10px}
  .tnav__btn{width:40px;height:40px;flex:none;border:none;border-radius:var(--radius-full);background:var(--bg-canvas);
    color:var(--text-primary);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .prog{flex:1;display:flex;gap:6px}
  .prog i{flex:1;height:8px;border-radius:var(--radius-full);background:var(--border-default)}
  .prog i.on{background:var(--bg-brand)}
  .hearts{flex:none;display:flex;align-items:center;gap:4px;color:var(--bg-critical);font-weight:700;font-size:17px}
  .hearts svg{width:22px;height:22px}

  /* task */
  .task{flex:1;min-height:0;display:flex;flex-direction:column;gap:14px;padding:20px 20px 12px;overflow:auto}
  .task__step{font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-tertiary)}
  .task__q{font-family:var(--display);font-weight:700;font-size:24px;line-height:30px;color:var(--text-primary)}
  .task__expr{margin:6px 0;font-family:var(--display);font-weight:700;font-size:40px;line-height:1;color:var(--text-primary);display:flex;align-items:center;gap:10px}
  .task__expr .rad{display:inline-flex;align-items:baseline}
  .task__hint{font-size:15px;color:var(--text-secondary)}
  .answer{margin-top:auto;min-height:58px;display:flex;align-items:center;gap:2px;padding:15px 16px;
    border:2px solid var(--bg-brand);border-radius:var(--radius-l);background:var(--bg-surface);font-size:24px;color:var(--text-primary)}
  .answer .ph{color:var(--text-tertiary)}
  .cursor{width:2px;height:28px;background:var(--bg-brand);animation:blink 1.05s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  /* keyboard (fluid to screen width) */
  .kbd{position:relative;flex:none;padding:8px 16px 4px;background:var(--bg-canvas)}
  .bar{display:flex;gap:4px;margin-bottom:8px}
  .act{flex:none;width:60px;height:58px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
    background:var(--bg-surface);color:var(--text-primary);border:none;border-radius:var(--radius-full);
    box-shadow:0 1px 1px rgba(10,10,10,.05)}
  .check{flex:1;height:58px;cursor:pointer;border:none;background:var(--bg-brand);color:var(--on-brand);
    border-radius:var(--radius-full);font:700 18px/23px var(--font)}
  .check:active{background:var(--bg-brand-pressed)}
  .grid{display:grid;gap:4px;grid-auto-rows:62px}
  .key{position:relative;width:100%;height:100%;cursor:pointer;border:none;display:inline-flex;align-items:center;
    justify-content:center;background:var(--bg-surface);color:var(--text-primary);border-radius:var(--radius-m);
    box-shadow:0 1px 1px rgba(10,10,10,.05);font:400 24px/29px var(--font)}
  .key:active{background:var(--bg-canvas)}
  .key--op{background:var(--bg-accent-orange);color:var(--on-brand)}
  .key--fn{font-size:19px}
  .ico{display:inline-flex}.ico svg{display:block}
  .frac{display:inline-flex;flex-direction:column;align-items:center;line-height:1;font-size:20px}
  .frac b{font-weight:400;padding:1px 6px}.frac b:first-child{border-bottom:1.5px solid currentColor}
  .hint{position:absolute;top:5px;right:8px;font-style:normal;font-size:11px;line-height:1;color:var(--text-tertiary)}
  .key--op .hint{color:var(--on-brand-2)}
  .scrim{position:absolute;inset:0;background:rgba(10,10,10,.45);opacity:0;visibility:hidden;transition:opacity .12s;z-index:4}
  .kbd.dim .scrim{opacity:1;visibility:visible}
  .expand{position:absolute;z-index:5;display:flex;gap:4px}.expand[hidden]{display:none}
  .kx{display:inline-flex;align-items:center;justify-content:center;height:100%;border-radius:var(--radius-m);overflow:hidden;
    background:var(--bg-surface);color:var(--text-primary);font:400 24px/1 var(--font);box-shadow:0 2px 6px rgba(10,10,10,.14)}
  .kx.on{background:var(--bg-brand);color:var(--on-brand);box-shadow:0 2px 10px rgba(0,102,254,.4)}
  .kx--stack{flex-direction:column;gap:0;line-height:1.03}.kx__arc{font-size:12px}.kx__base{font-size:19px}
  .dots{display:flex;gap:5px;justify-content:center;padding:8px 0}
  .dots i{width:7px;height:7px;border-radius:var(--radius-full);background:var(--border-default)}
  .dots i.on{background:var(--text-tertiary)}
  .home{display:flex;justify-content:center;padding:6px 0 4px}
  .home i{width:135px;height:5px;border-radius:var(--radius-full);background:var(--text-primary)}
</style>
</head>
<body>
  <div class="device">
    <div class="screen">
      <div class="island"></div>
      <div class="statusbar"><span>9:41</span><span class="r">···| &nbsp; ▮</span></div>

      <div class="tnav">
        <button class="tnav__btn" aria-label="Закрыть"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
        <span class="prog"><i class="on"></i><i class="on"></i><i class="on"></i><i></i><i></i></span>
        <span class="hearts"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-8-4.7-8-10.3A4.7 4.7 0 0 1 12 7a4.7 4.7 0 0 1 8 3.7C20 16.3 12 21 12 21z"/></svg>3</span>
      </div>

      <div class="task">
        <div class="task__step">Задача 4 · Квадратные корни</div>
        <div class="task__q">Вычислите значение выражения:</div>
        <div class="task__expr"><span class="rad">√196</span><span>+ 3 · 4</span></div>
        <div class="task__hint">Введите ответ числом.</div>
        <div class="answer"><span class="rad">√196</span>&nbsp;+ 12<span class="cursor"></span></div>
      </div>

      <div class="kbd" id="kbd">
        <div class="bar">
          <button class="act" id="actEdit"></button>
          <button class="act" id="actChat"></button>
          <button class="check">Проверить</button>
        </div>
        <div class="pages" id="pages"></div>
        <div class="dots"><i></i><i class="k1on on"></i><i></i></div>
        <div class="home"><i></i></div>
        <div class="scrim"></div>
        <div class="expand" id="expand" hidden></div>
      </div>
    </div>
  </div>

<script>
(function(){
  var ICON={
    edit:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
    chat:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.5 8.5 0 0 1-12.3 7.6L3 21l1.9-5.7A8.5 8.5 0 1 1 21 11.5z"/></svg>',
    back:'<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 5H8.5a2 2 0 0 0-1.5.7L2.6 11a1.5 1.5 0 0 0 0 2l4.4 5.3a2 2 0 0 0 1.5.7H21a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"/><path d="M12 9.5l4 5M16 9.5l-4 5"/></svg>'
  };
  var EXP={
    '<':{opts:['<','≤'],hint:'≤'},'>':{opts:['>','≥'],hint:'≥'},
    '√':{opts:['√','ⁿ√'],hint:'ⁿ√'},'( )':{opts:['( )','[ ]','{ }'],hint:'[ ]'},
    ',':{opts:['.',';',','],hint:';'}
  };
  var op=function(l){return{l:l,t:'op'}},sym=function(l){return{l:l,t:'sym'}};
  var frac=function(a,b){return{frac:[a,b],t:'sym'}},back={t:'back'};
  var xp=function(l){return{l:l,x:l}},xpS=function(l){return{l:l,t:'sym',x:l}};
  // экран показывает раскладку Advanced (в задаче есть √)
  var rows=[
    [xp('<'),xp('>'),'=','≠',back],
    [frac('x','y'),'7','8','9',op('÷')],
    [sym('x²'),'4','5','6',op('×')],
    [sym('x³'),'1','2','3',op('−')],
    [xpS('√'),xpS('( )'),'0',xp(','),op('+')]
  ];
  var norm=function(k){return typeof k==='string'?{l:k}:k};
  function keyEl(k){
    var e=norm(k),ex=e.x?EXP[e.x]:null,b=document.createElement('button');
    b.type='button';b.className='key'+(e.t?(' key--'+e.t):'')+(ex?' key--exp':'');
    if(ex){b.setAttribute('data-opts',JSON.stringify(ex.opts));b.setAttribute('data-active',ex.opts.indexOf(e.x));}
    var inner=e.t==='back'?'<span class="ico">'+ICON.back+'</span>':e.frac?'<span class="frac"><b>'+e.frac[0]+'</b><b>'+e.frac[1]+'</b></span>':'<span class="l">'+e.l+'</span>';
    if(ex)inner+='<i class="hint">'+ex.hint+'</i>';b.innerHTML=inner;return b;
  }
  document.getElementById('actEdit').innerHTML=ICON.edit;
  document.getElementById('actChat').innerHTML=ICON.chat;
  var g=document.createElement('div');g.className='grid';g.style.gridTemplateColumns='repeat(5,1fr)';
  rows.forEach(function(r){r.forEach(function(k){g.appendChild(keyEl(k));});});
  document.getElementById('pages').appendChild(g);

  var kbd=document.getElementById('kbd'),expand=document.getElementById('expand'),openKey=null;
  function closeExp(){kbd.classList.remove('dim');expand.hidden=true;expand.innerHTML='';openKey=null;}
  function openExp(key){
    var opts=JSON.parse(key.getAttribute('data-opts')||'[]'),active=parseInt(key.getAttribute('data-active'),10)||0;
    var br=kbd.getBoundingClientRect(),kr=key.getBoundingClientRect(),cw=kr.width,ch=kr.height,gap=4,n=opts.length,stripW=n*cw+(n-1)*gap;
    var left=active===0?(kr.left-br.left):(kr.right-br.left-stripW);left=Math.max(4,Math.min(left,br.width-4-stripW));
    expand.style.left=left+'px';expand.style.top=(kr.top-br.top)+'px';expand.style.height=ch+'px';
    expand.innerHTML=opts.map(function(o,i){var m=/^arc(.+)/.exec(o);var body=m?'<span class="kx__arc">arc</span><span class="kx__base">'+m[1]+'</span>':o;return '<b class="kx'+(i===active?' on':'')+(m?' kx--stack':'')+'" style="width:'+cw+'px">'+body+'</b>';}).join('');
    kbd.classList.add('dim');expand.hidden=false;openKey=key;
  }
  document.getElementById('pages').addEventListener('click',function(e){var k=e.target.closest('.key--exp');if(k){e.stopPropagation();if(openKey===k)closeExp();else openExp(k);}});
  kbd.addEventListener('click',function(e){if(kbd.classList.contains('dim')&&!e.target.closest('.key--exp'))closeExp();});
})();
</script>
</body>
</html>
